<!-- src/app/pages/inscription/inscription.component.html -->

<div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" 
     data-sidebartype="full" data-sidebar-position="fixed" data-header-position="fixed">
  <div class="position-relative overflow-hidden radial-gradient min-vh-100 d-flex align-items-center justify-content-center">
    <div class="d-flex align-items-center justify-content-center w-100">
      <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-6 col-xxl-3">
          <div class="card mb-0">
            <div class="card-body">
              
              <!-- Logo -->
              <a routerLink="/" class="text-nowrap logo-img text-center d-block py-3 w-100">
                <img src="../assets/images/logos/dark-logo.svg" width="180" alt="Logo">
              </a>
              
              <p class="text-center">Créez votre compte administrateur</p>
              
              <!-- Message d'erreur -->
              <div *ngIf="errorMessage" class="alert alert-danger text-center" role="alert">
                {{ errorMessage }}
              </div>
              
              <!-- Formulaire d'inscription -->
              <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                
                <!-- Nom -->
                <div class="mb-3">
                  <label for="nomAdmin" class="form-label">Nom</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    id="nomAdmin" 
                    formControlName="nomAdmin"
                    [class.is-invalid]="submitted && f['nomAdmin'].errors"
                    placeholder="Dupont">
                  <div *ngIf="submitted && f['nomAdmin'].errors" class="invalid-feedback">
                    <div *ngIf="f['nomAdmin'].errors['required']">Le nom est requis</div>
                    <div *ngIf="f['nomAdmin'].errors['minlength']">Minimum 2 caractères</div>
                  </div>
                </div>
                
                <!-- Prénom -->
                <div class="mb-3">
                  <label for="prenomAdmin" class="form-label">Prénom</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    id="prenomAdmin" 
                    formControlName="prenomAdmin"
                    [class.is-invalid]="submitted && f['prenomAdmin'].errors"
                    placeholder="Jean">
                  <div *ngIf="submitted && f['prenomAdmin'].errors" class="invalid-feedback">
                    <div *ngIf="f['prenomAdmin'].errors['required']">Le prénom est requis</div>
                    <div *ngIf="f['prenomAdmin'].errors['minlength']">Minimum 2 caractères</div>
                  </div>
                </div>
                
                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    formControlName="email"
                    [class.is-invalid]="submitted && f['email'].errors"
                    placeholder="admin@example.com">
                  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">L'email est requis</div>
                    <div *ngIf="f['email'].errors['email']">Email invalide</div>
                  </div>
                </div>
                
                <!-- Mot de passe -->
                <div class="mb-3">
                  <label for="password" class="form-label">Mot de passe</label>
                  <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    formControlName="password"
                    [class.is-invalid]="submitted && f['password'].errors"
                    placeholder="********">
                  <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                    <div *ngIf="f['password'].errors['required']">Le mot de passe est requis</div>
                    <div *ngIf="f['password'].errors['minlength']">Minimum 6 caractères</div>
                  </div>
                </div>
                
                <!-- Confirmation mot de passe -->
                <div class="mb-4">
                  <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                  <input 
                    type="password" 
                    class="form-control" 
                    id="confirmPassword" 
                    formControlName="confirmPassword"
                    [class.is-invalid]="submitted && registerForm.errors?.['passwordMismatch']"
                    placeholder="********">
                  <div *ngIf="submitted && registerForm.errors?.['passwordMismatch']" class="invalid-feedback">
                    Les mots de passe ne correspondent pas
                  </div>
                </div>
                
                <!-- Bouton d'inscription -->
                <button 
                  type="submit" 
                  class="btn btn-primary w-100 py-8 fs-4 mb-4 rounded-2"
                  [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  {{ loading ? 'Inscription en cours...' : "S'inscrire" }}
                </button>
                
                <!-- Lien vers connexion -->
                <div class="d-flex align-items-center justify-content-center">
                  <p class="fs-4 mb-0 fw-bold">Déjà un compte ?</p>
                  <a class="text-primary fw-bold ms-2" routerLink="/connexion">Se connecter</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
