<!-- src/app/pages/connexion/connexion.component.html -->

<div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" 
     data-sidebartype="full" data-sidebar-position="fixed" data-header-position="fixed">
  <div class="position-relative overflow-hidden radial-gradient min-vh-100 d-flex align-items-center justify-content-center">
    <div class="d-flex align-items-center justify-content-center w-100">
      <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-6 col-xxl-3">
          <div class="card mb-0">
            <div class="card-body">
              
              <!-- Logo -->
              <a routerLink="/" class="text-nowrap logo-img text-center d-block py-3 w-100">
                <img src="../assets/images/logos/dark-logo.svg" width="180" alt="Logo">
              </a>
              
              <p class="text-center">Connectez-vous à votre espace admin</p>
              
              <!-- Message de succès (après inscription) -->
              <div *ngIf="successMessage" class="alert alert-success text-center" role="alert">
                {{ successMessage }}
              </div>
              
              <!-- Message d'erreur -->
              <div *ngIf="errorMessage" class="alert alert-danger text-center" role="alert">
                {{ errorMessage }}
              </div>
              
              <!-- Formulaire de connexion -->
              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                
                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    formControlName="email"
                    [class.is-invalid]="submitted && f['email'].errors"
                    placeholder="admin@example.com">
                  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">L'email est requis</div>
                    <div *ngIf="f['email'].errors['email']">Email invalide</div>
                  </div>
                </div>
                
                <!-- Mot de passe -->
                <div class="mb-4">
                  <label for="password" class="form-label">Mot de passe</label>
                  <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    formControlName="password"
                    [class.is-invalid]="submitted && f['password'].errors"
                    placeholder="********">
                  <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                    <div *ngIf="f['password'].errors['required']">Le mot de passe est requis</div>
                    <div *ngIf="f['password'].errors['minlength']">Minimum 6 caractères</div>
                  </div>
                </div>
                
                <!-- Options -->
                <div class="d-flex align-items-center justify-content-between mb-4">
                  <div class="form-check">
                    <input class="form-check-input primary" type="checkbox" id="flexCheckChecked" checked>
                    <label class="form-check-label text-dark" for="flexCheckChecked">
                      Se souvenir de moi
                    </label>
                  </div>
                  <a class="text-primary fw-bold" href="#">Mot de passe oublié ?</a>
                </div>
                
                <!-- Bouton de connexion -->
                <button 
                  type="submit" 
                  class="btn btn-primary w-100 py-8 fs-4 mb-4 rounded-2"
                  [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
                </button>
                
                <!-- Lien vers inscription -->
                <div class="d-flex align-items-center justify-content-center">
                  <p class="fs-4 mb-0 fw-bold">Pas encore de compte ?</p>
                  <a class="text-primary fw-bold ms-2" routerLink="/inscription">Créer un compte</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
