services:

  mysql:
    image: mysql:8
    container_name: electronic_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  springboot-app:
    image: zbestleboss/electronic_backend
    container_name: electronicbackend
    restart: always

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_EXPIRATION_TIME: ${APP_EXPIRATION_TIME}

    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - spring-network

  angular-app:
    image: zbestleboss/electronic-admin-frontend
    container_name: electronicfrontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - springboot-app
    networks:
      - spring-network


networks:
  spring-network:
    driver: bridge

volumes:
  mysql_data: