<!--  Body Wrapper -->
<div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
  data-sidebar-position="fixed" data-header-position="fixed">
  <!--  Main wrapper -->
  <div class="body-wrapper">

    <div class="container-fluid">

      <!-- Formulaire simple pour ajouter une catégorie -->
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-body p-4">
              <h5 class="card-title fw-semibold mb-4">{{ isEditing ? 'Modifier' : 'Ajouter' }} une catégorie</h5>
              
              <form (ngSubmit)="onSubmit()" #categorieForm="ngForm">
                <div class="row">
                  <!-- UNIQUEMENT le nom de la catégorie -->
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="nomCategorie" class="form-label fw-semibold">Nom de la catégorie <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="nomCategorie" name="nomCategorie" 
                             [(ngModel)]="categorie.nomCategorie"
                             placeholder="Ex: Électronique, Vêtements, Alimentation..." required>
                    </div>
                  </div>
                  
                  <!-- Boutons d'action -->
                  <div class="col-md-6 d-flex align-items-end">
                    <div class="mb-3">
                      <button type="submit" class="btn btn-primary" [disabled]="!categorie.nomCategorie.trim()">
                        <i class="ti ti-plus me-2"></i>{{ isEditing ? 'Modifier' : 'Ajouter' }} la catégorie
                      </button>
                      <button type="button" class="btn btn-secondary ms-2" *ngIf="isEditing" (click)="resetForm()">
                        <i class="ti ti-x me-2"></i>Annuler
                      </button>
                    </div>
                  </div>
                </div>
              </form>

              <!-- Liste des catégories existantes -->
              <div class="mt-4">
                <h6 class="fw-semibold mb-3">Catégories existantes</h6>
                <div class="table-responsive">
                  <table class="table table-bordered align-middle">
                    <thead class="table-light">
                      <tr>
                        <th>Nom de la catégorie</th>
                        <th style="width: 150px;">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      <!-- Application du slice pour n'afficher que les éléments de la page active -->
                      <tr *ngFor="let cat of categories | slice: (currentPage * pageSize) : ((currentPage + 1) * pageSize)">
                        <td>{{ cat.nomCategorie }}</td>
                        <td>
                          <button class="btn btn-sm btn-outline-primary me-2" (click)="editCategorie(cat)">
                            <i class="ti ti-edit"></i>
                          </button>
                          <button class="btn btn-sm btn-outline-danger" (click)="deleteCategorie(cat.id)">
                            <i class="ti ti-trash"></i>
                          </button>
                        </td>
                      </tr>
                      <tr *ngIf="categories.length === 0">
                        <td colspan="2" class="text-center text-muted">Aucune catégorie trouvée</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <!-- CONTRÔLES DE PAGINATION (Logique exclusive demandée) -->
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 border-top pt-3" *ngIf="categories.length > 0">
                  <div>
                    <span class="text-muted small">
                      Affichage de <strong>{{ getStartIndex() }}</strong> à <strong>{{ getEndIndex() }}</strong> 
                      sur <strong>{{ totalElements }}</strong> catégories
                    </span>
                  </div>

                  <div class="d-flex align-items-center gap-3">
                    <select class="form-select form-select-sm" style="width: auto;" [(ngModel)]="pageSize" (change)="onPageSizeChange()">
                      <option [value]="5">5</option>
                      <option [value]="10">10</option>
                      <option [value]="20">20</option>
                    </select>

                    <nav>
                      <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" [class.disabled]="currentPage === 0">
                          <button class="page-link" (click)="goToPage(0)">««</button>
                        </li>
                        <li class="page-item" [class.disabled]="currentPage === 0">
                          <button class="page-link" (click)="previousPage()">«</button>
                        </li>
                        <li class="page-item" *ngFor="let page of getPages()" [class.active]="page === currentPage">
                          <button class="page-link" (click)="goToPage(page)">{{ page + 1 }}</button>
                        </li>
                        <li class="page-item" [class.disabled]="currentPage === getTotalPages() - 1">
                          <button class="page-link" (click)="nextPage()">»</button>
                        </li>
                        <li class="page-item" [class.disabled]="currentPage === getTotalPages() - 1">
                          <button class="page-link" (click)="goToLastPage()">»»</button>
                        </li>
                      </ul>
                    </nav>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
